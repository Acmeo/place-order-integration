# Local-development overlay.
#
# docker-compose.yml references images by ghcr.io/${OWNER}/... so a
# tagged bundle can be pulled and run anywhere. For developers iterating
# locally (and for the in-repo integration tests), this overlay restores
# the original behaviour: each satellite is BUILT from the sibling
# working tree, and the five Sales images are taken from local Pants
# tags (sales-*:latest) without any registry round trip.
#
# Compose merges this file automatically when present. The release
# workflow validates the actual GHCR bundle by invoking compose with
# `-f docker-compose.yml` ONLY (the override is omitted explicitly).
#
# Behaviour: when both files set `image:`, the override wins. When the
# override adds `build:`, compose builds locally and tags the resulting
# image with whatever `image:` resolves to, so the rest of the compose
# graph keeps working unchanged.

services:
  # --- Sales: locally tagged by Pants, no registry round trip ---

  sales-migrate:
    image: sales-migrate:latest

  sales-api:
    image: sales-api:latest

  sales-payment-handler:
    image: sales-payment-handler:latest

  sales-outbox-relay:
    image: sales-outbox-relay:latest

  sales-shipping-dispatcher:
    image: sales-shipping-dispatcher:latest

  # --- Satellites: build from the sibling working tree ---

  catalog:
    build:
      context: ../catalog

  identity:
    build:
      context: ../identity

  fake-payment-gateway:
    build:
      context: ../fake-payment-gateway

  fake-shipping-carrier:
    build:
      context: ../fake-shipping-carrier

  notifications:
    build:
      context: ../notifications

  analytics:
    build:
      context: ../analytics
