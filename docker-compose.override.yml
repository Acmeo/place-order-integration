# Local-development overlay.
#
# docker-compose.yml references images by ghcr.io/${OWNER}/... so a
# tagged bundle can be pulled and run anywhere. For developers iterating
# locally (and for the in-repo integration tests), this overlay swaps
# those references for pre-built local images: the five Sales tags
# (sales-*:latest, as produced by `pants package` in ../sales) replace
# the GHCR refs. The six satellites do NOT get an override here -- they
# stay on the inherited ghcr.io/${OWNER}/<svc>:${<SVC>_VERSION} ref and
# must already exist in the local Docker daemon, produced by either
# `make image` in each satellite repo or `docker compose build` from
# this directory (the integrator's `make compose-build` target does
# this).
#
# Symmetry note: nothing in this overlay builds inline. Every service
# is treated the same way -- a pre-built image must exist in the local
# Docker daemon before `docker compose up`. That mirrors how Sales has
# always worked (Pants produces images first) and removes the implicit
# "compose builds for me on first up" path that only some services used
# to have.
#
# Compose merges this file automatically when present. The release
# workflow validates the actual GHCR bundle by invoking compose with
# `-f docker-compose.yml` ONLY (the override is omitted explicitly).

services:
  # --- Sales: locally tagged by Pants ---

  sales-migrate:
    image: sales-migrate:latest

  sales-api:
    image: sales-api:latest

  sales-payment-handler:
    image: sales-payment-handler:latest

  sales-outbox-relay:
    image: sales-outbox-relay:latest

  sales-shipping-dispatcher:
    image: sales-shipping-dispatcher:latest
