# place-order-integration: certified-compatible bundle.
#
# This file is the source of truth for the bundle: the GHCR namespace
# all images are pulled from, plus the per-service pinned versions.
# Every image is published to:
#
#   ghcr.io/<owner>/<service>:<version>
#
# Bumps to this file land via auto-PR after a satellite (or Sales)
# publishes a new release and the E2E suite passes against the
# resulting bundle. Tagged releases of this repo are immutable
# snapshots of this manifest -- a "compatibility certificate" for the
# pinned combination.
#
# Policy: changes between releases are expand/contract (every new
# version is backwards-compatible with the previous bundle). For
# genuinely breaking changes, the escape hatch is RC + coordinated
# promotion -- see README.md.

# GHCR namespace. Change this on a fork that publishes to a different
# org/user. CI workflows override via the OWNER env var so a single
# fork can run integration against upstream images if it wants to.
owner: your-github-user

services:
  # Sales (5 Pants-built images, one per process)
  sales-api: "0.1.0"
  sales-payment-handler: "0.1.0"
  sales-outbox-relay: "0.1.0"
  sales-shipping-dispatcher: "0.1.0"
  sales-migrate: "0.1.0"

  # Real satellites (own totalities)
  catalog: "0.1.0"
  identity: "0.1.0"

  # Third-party fakes
  fake-payment-gateway: "0.1.0"
  fake-shipping-carrier: "0.1.0"

  # Outbox consumers
  notifications: "0.1.0"
  analytics: "0.1.0"
